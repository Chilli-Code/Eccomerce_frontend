<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>MobileShop — Phones, Tablets & Accessories</title>
    <meta
      name="description"
      content="Shop the latest smartphones, tablets and accessories. New-season collections with exclusive deals and fast shipping."
    />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Preconnect: must have crossorigin on gstatic to match the font request -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Non-render-blocking font load:
      1. media="print" loads it in background (doesn't block render)
      2. onload switches it to "all" so it applies once downloaded
      3. <noscript> is the fallback for users with JS disabled
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cookie&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Cookie&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
